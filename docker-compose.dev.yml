name: videgrenier-dev
services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-dev
    ports:
      - "${DEV_APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: "${APP_ENV:-DEV}" 
      DB_HOST: mysql-dev
      DB_NAME: "${DEV_DB_NAME:-videgrenier_dev}"
      DB_USER: "${DEV_DB_USER:-dev_user}"
      DB_PASSWORD: "${DEV_DB_PASSWORD:-dev_password}"
    depends_on:
      mysql-dev:
        condition: service_healthy

  mysql-dev:
    image: mysql:8.0
    container_name: mysql-dev
    ports:
      - "${DEV_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DEV_DB_NAME:-videgrenier_dev}"
      MYSQL_USER: "${DEV_DB_USER:-dev_user}"
      MYSQL_PASSWORD: "${DEV_DB_PASSWORD:-dev_password}"
      MYSQL_ROOT_PASSWORD: "${DEV_DB_ROOT_PASSWORD:-root_dev_password}"
    volumes:
      - ./data/dev:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DEV_DB_ROOT_PASSWORD:-root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s